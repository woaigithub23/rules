# **=============================== 规则集合 ===============================**
# 锚定behavior行为，可选domain/ipcidr/classical，对应不同格式的 rule-provider 文件格式，请按实际格式填写
# 锚定format格式，可选 yaml/text/mrs，默认 yaml.  mrs目前 behavior 仅支持 domain/ipcidr
# 规则文件和格式对应：mrs--mrs文件，yaml--yaml文件，text--txt，list文件。
# Mihomo内核规则文件的读取解析速度由快到慢： mrs 》 txt / list 》 yaml 。
# mihomo官方mrs地址，替换private  geosite https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs 
# mihomo官方mrs地址，替换private  geoip https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs 
# DNS_No_Resolve 规则 适合fakeip模式，
# 对照rules-providers规则名修改nameserver-policy 名

rule-anchor: 
  yaml-domain: &yaml-domain {type: http, behavior: domain, interval: 86400, format: yaml}
  yaml-ipcidr: &yaml-ipcidr {type: http, behavior: ipcidr, interval: 86400, format: yaml}
  yaml-classical: &yaml-classical {type: http, behavior: classical, interval: 86400, format: yaml}
  text-domain: &text-domain {type: http, behavior: domain, interval: 86400, format: text}
  text-ipcidr: &text-ipcidr {type: http, behavior: ipcidr, interval: 86400, format: text}
  text-classical: &text-classical {type: http, behavior: classical, interval: 86400, format: text}
  mrs-domain: &mrs-domain {type: http, behavior: domain, interval: 86400, format: mrs}
  mrs-ipcidr: &mrs-ipcidr {type: http, behavior: ipcidr, interval: 86400, format: mrs}
